<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeStudy Hub · Mock</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
:root{--navy:#0B1F3A;--navy2:#1A3558;--blue:#1D4ED8;--teal:#0D9488;--teal2:#2DD4BF;--ink:#1E293B;--muted:#64748B;--line:#E2E8F0;--bg:#F1F5F9;--green:#10B981;--rose:#F43F5E;--gold:#F59E0B;--sans:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* top bar */
.bar{position:sticky;top:0;z-index:20;height:60px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 22px;}
.bar .l{display:flex;align-items:center;gap:14px;}
.bk{background:rgba(255,255,255,.1);border:none;color:#fff;font:inherit;font-weight:600;font-size:13px;padding:7px 13px;border-radius:8px;cursor:pointer;}
.bk:hover{background:rgba(255,255,255,.18);}
.ttl{font-weight:700;font-size:15px;}
.ttl small{display:block;font-size:10px;letter-spacing:1.5px;color:var(--teal2);text-transform:uppercase;font-weight:600;}
.timer{font-family:var(--mono);font-weight:600;font-size:17px;background:rgba(255,255,255,.08);padding:7px 15px;border-radius:9px;display:flex;align-items:center;gap:8px;}
.timer.warn{color:#FCA5A5;background:rgba(244,63,94,.18);}
.timer .dot{width:7px;height:7px;border-radius:50%;background:var(--teal2);}
.timer.warn .dot{background:#FCA5A5;}

/* progress strip */
.strip{height:4px;background:#E2E8F0;}
.strip>div{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .3s;}

/* layout */
.wrap{max-width:880px;margin:0 auto;padding:30px 22px 130px;animation:fade .25s ease;}
.qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.qnum{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.qtags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:600;color:var(--teal);background:rgba(13,148,136,.1);padding:3px 9px;border-radius:20px;}

.passage{background:#fff;border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:10px;padding:18px 20px;margin-bottom:18px;font-family:'Source Serif 4',serif;font-size:15.5px;line-height:1.7;color:#334155;}
.passage b{font-family:var(--sans);}

.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px 26px 22px;box-shadow:0 1px 3px rgba(11,31,58,.05);}
.stem{font-size:18px;line-height:1.55;font-weight:500;margin-bottom:20px;}
.stem .blank{display:inline-block;min-width:60px;border-bottom:2px solid var(--blue);}

/* quantitative comparison */
.qc{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.qc>div{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center;}
.qc .lab{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.qc .val{font-size:20px;font-family:var(--mono);}

/* options */
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:flex-start;gap:13px;padding:14px 16px;border:1.5px solid var(--line);border-radius:11px;cursor:pointer;background:#fff;transition:border-color .12s,background .12s;font-size:15.5px;line-height:1.45;}
.opt:hover{border-color:#94A3B8;}
.opt.sel{border-color:var(--blue);background:rgba(29,78,216,.05);}
.opt .mk{width:24px;height:24px;border:2px solid #CBD5E1;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);margin-top:1px;}
.opt.multi .mk{border-radius:7px;}
.opt.sel .mk{border-color:var(--blue);background:var(--blue);color:#fff;}
/* review states */
.opt.correct{border-color:var(--green);background:rgba(16,185,129,.07);}
.opt.correct .mk{border-color:var(--green);background:var(--green);color:#fff;}
.opt.wrong{border-color:var(--rose);background:rgba(244,63,94,.06);}
.opt.wrong .mk{border-color:var(--rose);background:var(--rose);color:#fff;}

/* numeric */
.numbox{display:flex;align-items:center;gap:12px;}
.numbox input{font:inherit;font-size:18px;font-family:var(--mono);width:200px;padding:13px 16px;border:1.5px solid #CBD5E1;border-radius:11px;outline:none;}
.numbox input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.12);}

/* explanation (review) */
.expl{margin-top:18px;background:#F8FAFC;border:1px solid var(--line);border-radius:11px;padding:16px 18px;font-size:14.5px;line-height:1.6;color:#334155;display:none;}
.expl.show{display:block;animation:fade .2s ease;}
.expl .et{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:6px;}
.expl.miss .et{color:var(--rose);}

/* bottom nav */
.botnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;z-index:20;}
.dots{display:flex;gap:6px;flex-wrap:wrap;max-width:55%;}
.dot{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;}
.dot.done{border-color:var(--blue);background:rgba(29,78,216,.08);color:var(--blue);}
.dot.cur{border-color:var(--navy);background:var(--navy);color:#fff;}
.dot.flag{box-shadow:inset 0 0 0 2px var(--gold);}
.dot.rcorrect{border-color:var(--green);background:rgba(16,185,129,.12);color:var(--green);}
.dot.rwrong{border-color:var(--rose);background:rgba(244,63,94,.12);color:var(--rose);}
.navbtns{display:flex;gap:10px;}
.btn{font:inherit;font-weight:700;font-size:14px;padding:11px 22px;border-radius:10px;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--ink);}
.btn:hover{border-color:#94A3B8;}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn.primary:hover{background:var(--navy2);}
.btn.go{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.flagbtn{background:none;border:none;font:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;}
.flagbtn.on{color:var(--gold);}

/* score screen */
.score{max-width:560px;margin:0 auto;padding:50px 22px 80px;text-align:center;animation:fade .3s ease;}
.sbig{font-size:80px;font-weight:800;color:var(--navy);line-height:1;letter-spacing:-2px;}
.sscaled{font-family:var(--mono);font-size:15px;color:var(--teal);font-weight:600;margin-top:4px;}
.ssub{font-size:14px;color:var(--muted);margin:6px 0 26px;}
.sbar{height:12px;background:#E2E8F0;border-radius:8px;overflow:hidden;margin-bottom:26px;}
.sbar>div{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width 1s ease;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.scell{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;}
.scell b{display:block;font-size:30px;font-weight:800;line-height:1;}
.scell span{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:6px;display:block;}
.taglist{text-align:left;background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:26px;}
.taglist h4{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.trow{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.trow:last-child{margin-bottom:0;}
.trow .tn{font-size:13px;font-weight:600;width:130px;flex:0 0 auto;}
.trow .tb{flex:1;height:7px;background:#E2E8F0;border-radius:5px;overflow:hidden;}
.trow .tb>div{height:100%;border-radius:5px;}
.trow .tp{font-family:var(--mono);font-size:13px;font-weight:600;width:54px;text-align:right;}

.center{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
.hidden{display:none!important;}
</style>
<script>
window.MathJax = { tex:{inlineMath:[['\\(','\\)'],['$','$']]}, options:{skipHtmlTags:['script','noscript','style','textarea']} };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>

<div id="loading" class="center"><div class="spinner"></div><div>Loading mock…</div></div>

<div id="app" class="hidden">
  <div class="bar">
    <div class="l">
      <button class="bk" onclick="quit()">← Exit</button>
      <div class="ttl"><small id="mSection">Mock</small><span id="mTitle">—</span></div>
    </div>
    <div class="timer" id="timer"><span class="dot"></span><span id="timeTxt">--:--</span></div>
  </div>
  <div class="strip"><div id="strip" style="width:0%"></div></div>

  <!-- QUESTION VIEW -->
  <div class="wrap" id="qView">
    <div class="qhead">
      <div class="qnum" id="qNum">Question 1</div>
      <div class="qtags" id="qTags"></div>
    </div>
    <div id="qBody"></div>
    <div class="expl" id="expl"></div>
  </div>

  <!-- SCORE VIEW -->
  <div class="score hidden" id="scoreView">
    <div class="sbig" id="sPct">—</div>
    <div class="sscaled" id="sScaled"></div>
    <div class="ssub" id="sSub">Estimated score</div>
    <div class="sbar"><div id="sBar" style="width:0%"></div></div>
    <div class="sgrid">
      <div class="scell"><b style="color:var(--green)" id="sCorrect">0</b><span>Correct</span></div>
      <div class="scell"><b style="color:var(--rose)" id="sWrong">0</b><span>Wrong</span></div>
      <div class="scell"><b style="color:var(--muted)" id="sSkip">0</b><span>Skipped</span></div>
    </div>
    <div class="taglist hidden" id="tagList"><h4>Topic breakdown</h4><div id="tagRows"></div></div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn" onclick="startReview()">Review answers</button>
      <button class="btn primary" onclick="quit()">Back to my mocks</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="botnav" id="botnav">
    <div class="dots" id="dots"></div>
    <div style="display:flex;align-items:center;gap:16px;">
      <button class="flagbtn" id="flagBtn" onclick="toggleFlag()">⚑ Flag</button>
      <div class="navbtns">
        <button class="btn" id="prevBtn" onclick="go(-1)">Prev</button>
        <button class="btn primary" id="nextBtn" onclick="go(1)">Next</button>
        <button class="btn go hidden" id="submitBtn" onclick="confirmSubmit()">Submit</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="fsh-auth.js"></script>
<script src="fsh-data.js"></script>
<script>
var QS = new URLSearchParams(location.search);
var MOCK_ID = QS.get("id");
var ASG_ID = QS.get("a") || null;
var mock = null, Q = [], answers = {}, flags = {}, cur = 0, reviewing = false, submitted = false;
var startTs = Date.now(), remaining = 0, timerInt = null, ctx = null;

FSHAuth.gate({}).then(async function (c) {
  ctx = c;
  if (c.profile && c.profile.role === "teacher") {
    // teachers can preview but results won't be saved
  }
  if (!MOCK_ID) { document.getElementById("loading").innerHTML = "<div>No mock specified.</div>"; return; }
  mock = await FSHData.getMock(MOCK_ID);
  if (!mock) { document.getElementById("loading").innerHTML = "<div>Mock not found.</div>"; return; }
  Q = mock.questions || [];
  if (!Q.length) { document.getElementById("loading").innerHTML = "<div>This mock has no questions yet.</div>"; return; }
  boot();
});

function boot() {
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("mTitle").textContent = mock.title;
  document.getElementById("mSection").textContent = (mock.section === "verbal" ? "Verbal" : mock.section === "data" ? "Data Insights" : "Quantitative") + " Mock";
  buildDots();
  if (mock.timeLimit > 0) { remaining = mock.timeLimit * 60; startTimer(); }
  else { document.getElementById("timer").classList.add("hidden"); }
  render();
}

function startTimer() {
  tick();
  timerInt = setInterval(tick, 1000);
}
function tick() {
  if (remaining <= 0) { clearInterval(timerInt); doSubmit(); return; }
  remaining--;
  var m = Math.floor(remaining / 60), s = remaining % 60;
  document.getElementById("timeTxt").textContent = (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  document.getElementById("timer").classList.toggle("warn", remaining <= 60);
}

function buildDots() {
  document.getElementById("dots").innerHTML = Q.map(function (q, i) {
    return '<button class="dot" id="dot' + i + '" onclick="jump(' + i + ')">' + (i + 1) + '</button>';
  }).join("");
}
function updateDots() {
  Q.forEach(function (q, i) {
    var d = document.getElementById("dot" + i);
    d.className = "dot";
    if (reviewing) { d.classList.add(isCorrect(i) ? "rcorrect" : "rwrong"); }
    else if (answered(i)) d.classList.add("done");
    if (flags[i]) d.classList.add("flag");
    if (i === cur) d.classList.add("cur");
  });
  var pct = Math.round((cur + 1) / Q.length * 100);
  document.getElementById("strip").style.width = pct + "%";
}

function answered(i) {
  var a = answers[i];
  if (a === undefined || a === null || a === "") return false;
  if (Array.isArray(a)) return a.length > 0;
  return true;
}

function render() {
  var q = Q[cur];
  document.getElementById("qNum").textContent = "Question " + (cur + 1) + " of " + Q.length;
  document.getElementById("qTags").innerHTML = (q.tags || []).map(function (t) { return '<span class="tag">' + esc(t) + "</span>"; }).join("");

  var html = "";
  if (q.passage) html += '<div class="passage">' + q.passage + "</div>";
  html += '<div class="card">';
  if (q.type === "qc") {
    html += '<div class="stem">' + (q.stem || "Compare the two quantities.") + "</div>";
    html += '<div class="qc"><div><div class="lab">Quantity A</div><div class="val">' + (q.quantA || "") + '</div></div>' +
            '<div><div class="lab">Quantity B</div><div class="val">' + (q.quantB || "") + "</div></div></div>";
    html += renderOpts(q, qcOptions(), false);
  } else if (q.type === "numeric") {
    html += '<div class="stem">' + (q.stem || "") + "</div>";
    var v = answers[cur] != null ? esc(String(answers[cur])) : "";
    html += '<div class="numbox"><input id="numIn" type="text" inputmode="decimal" placeholder="Enter answer" value="' + v + '" ' +
            (reviewing ? "disabled" : 'oninput="setNumeric(this.value)"') + '></div>';
  } else {
    html += '<div class="stem">' + (q.stem || "") + "</div>";
    html += renderOpts(q, q.options || [], q.type === "multi");
  }
  html += "</div>";
  document.getElementById("qBody").innerHTML = html;

  // explanation in review
  var ex = document.getElementById("expl");
  if (reviewing && (q.explanation || true)) {
    var ok = isCorrect(cur);
    ex.className = "expl show" + (ok ? "" : " miss");
    ex.innerHTML = '<div class="et">' + (ok ? "✓ Correct" : "✗ " + correctLabel(q)) + "</div>" +
                   (q.explanation ? esc2(q.explanation) : "No explanation provided.");
  } else { ex.className = "expl"; ex.innerHTML = ""; }

  // flag button
  document.getElementById("flagBtn").classList.toggle("on", !!flags[cur]);
  document.getElementById("flagBtn").style.display = reviewing ? "none" : "";

  // nav buttons
  document.getElementById("prevBtn").disabled = cur === 0;
  var last = cur === Q.length - 1;
  document.getElementById("nextBtn").classList.toggle("hidden", last);
  document.getElementById("submitBtn").classList.toggle("hidden", !last || reviewing);
  if (last && reviewing) document.getElementById("nextBtn").classList.add("hidden");

  updateDots();
  if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([document.getElementById("qView")]).catch(function(){});
}

function qcOptions() {
  return ["Quantity A is greater", "Quantity B is greater", "The two quantities are equal",
          "The relationship cannot be determined from the information given"];
}
function renderOpts(q, opts, multi) {
  var sel = answers[cur];
  return '<div class="opts">' + opts.map(function (o, i) {
    var letter = String.fromCharCode(65 + i);
    var isSel = multi ? (Array.isArray(sel) && sel.indexOf(i) > -1) : (sel === i);
    var cls = "opt" + (multi ? " multi" : "");
    var mk = multi ? (isSel ? "✓" : "") : letter;
    if (reviewing) {
      var correct = q.answer;
      var isCorr = multi ? (Array.isArray(correct) && correct.indexOf(i) > -1) : (correct === i);
      if (isCorr) cls += " correct";
      else if (isSel) cls += " wrong";
      if (isSel && !isCorr) mk = "✕";
      if (isCorr) mk = "✓";
    } else if (isSel) cls += " sel";
    var click = reviewing ? "" : ' onclick="pick(' + i + "," + (multi ? "true" : "false") + ')"';
    return '<div class="' + cls + '"' + click + '><div class="mk">' + mk + '</div><div>' + o + "</div></div>";
  }).join("") + "</div>";
}

function pick(i, multi) {
  if (multi) {
    var a = Array.isArray(answers[cur]) ? answers[cur].slice() : [];
    var idx = a.indexOf(i);
    if (idx > -1) a.splice(idx, 1); else a.push(i);
    answers[cur] = a;
  } else { answers[cur] = i; }
  render();
}
function setNumeric(v) { answers[cur] = v === "" ? undefined : v; updateDots(); }

function toggleFlag() { flags[cur] = !flags[cur]; render(); }
function go(d) { var n = cur + d; if (n >= 0 && n < Q.length) { cur = n; render(); window.scrollTo(0, 0); } }
function jump(i) { cur = i; render(); window.scrollTo(0, 0); }

function isCorrect(i) {
  var q = Q[i], a = answers[i];
  if (q.type === "multi") {
    if (!Array.isArray(a) || !Array.isArray(q.answer)) return false;
    if (a.length !== q.answer.length) return false;
    return q.answer.every(function (x) { return a.indexOf(x) > -1; });
  }
  if (q.type === "numeric") {
    if (a == null || a === "") return false;
    var ua = parseFloat(String(a).replace(/[, ]/g, ""));
    var ca = parseFloat(String(q.answer).replace(/[, ]/g, ""));
    if (isNaN(ua) || isNaN(ca)) return String(a).trim() === String(q.answer).trim();
    return Math.abs(ua - ca) < 1e-6;
  }
  return a === q.answer;
}
function correctLabel(q) {
  if (q.type === "numeric") return "Answer: " + q.answer;
  if (q.type === "multi") return "Correct: " + (q.answer || []).map(function (i) { return String.fromCharCode(65 + i); }).join(", ");
  var opts = q.type === "qc" ? qcOptions() : (q.options || []);
  return "Answer: " + String.fromCharCode(65 + q.answer) + (opts[q.answer] ? " · " + stripTags(opts[q.answer]) : "");
}

function confirmSubmit() {
  var unanswered = Q.filter(function (q, i) { return !answered(i); }).length;
  var msg = unanswered ? ("You have " + unanswered + " unanswered question" + (unanswered > 1 ? "s" : "") + ". Submit anyway?") : "Submit your mock for grading?";
  if (confirm(msg)) doSubmit();
}

async function doSubmit() {
  if (submitted) return; submitted = true;
  if (timerInt) clearInterval(timerInt);
  var qr = {}, correct = 0, wrong = 0, skipped = 0, tags = {};
  Q.forEach(function (q, i) {
    var ok = isCorrect(i);
    qr[i + 1] = ok;
    if (!answered(i)) skipped++; else if (ok) correct++; else wrong++;
    (q.tags || []).forEach(function (t) {
      if (!tags[t]) tags[t] = { correct: 0, total: 0 };
      tags[t].total++; if (ok) tags[t].correct++;
    });
  });
  var pct = Math.round(correct / Q.length * 100);
  var scaled = 130 + Math.round(40 * pct / 100);
  var elapsed = Math.round((Date.now() - startTs) / 1000);

  showScore(pct, scaled, correct, wrong, skipped, tags);

  if (ctx.profile && ctx.profile.role === "teacher") return; // preview only
  try {
    await FSHData.saveResult({
      name: ctx.profile.name || ctx.user.email, email: ctx.user.email,
      testId: MOCK_ID, score: pct, scaled: scaled,
      correct: correct, wrong: wrong, skipped: skipped,
      timeUsed: elapsed, questionResults: qr, tagResults: tags, assignmentId: ASG_ID
    });
  } catch (e) { console.error("save failed", e); }
}

function showScore(pct, scaled, correct, wrong, skipped, tags) {
  document.getElementById("qView").classList.add("hidden");
  document.getElementById("botnav").classList.add("hidden");
  var sv = document.getElementById("scoreView");
  sv.classList.remove("hidden");
  document.getElementById("sPct").textContent = pct + "%";
  document.getElementById("sScaled").textContent = "≈ " + scaled + " scaled (130–170 est.)";
  document.getElementById("sSub").textContent = correct + " of " + Q.length + " correct" + (ctx.profile && ctx.profile.role === "teacher" ? " · preview, not saved" : "");
  document.getElementById("sCorrect").textContent = correct;
  document.getElementById("sWrong").textContent = wrong;
  document.getElementById("sSkip").textContent = skipped;
  setTimeout(function () { document.getElementById("sBar").style.width = pct + "%"; }, 100);
  var tagKeys = Object.keys(tags);
  if (tagKeys.length) {
    document.getElementById("tagList").classList.remove("hidden");
    document.getElementById("tagRows").innerHTML = tagKeys.map(function (t) {
      var p = Math.round(tags[t].correct / tags[t].total * 100);
      var col = p >= 70 ? "var(--green)" : p >= 50 ? "var(--gold)" : "var(--rose)";
      return '<div class="trow"><div class="tn">' + esc(t) + '</div><div class="tb"><div style="width:' + p + "%;background:" + col + '"></div></div><div class="tp" style="color:' + col + '">' + p + "%</div></div>";
    }).join("");
  }
  window.scrollTo(0, 0);
}

function startReview() {
  reviewing = true; cur = 0;
  document.getElementById("scoreView").classList.add("hidden");
  document.getElementById("qView").classList.remove("hidden");
  document.getElementById("botnav").classList.remove("hidden");
  document.getElementById("submitBtn").classList.add("hidden");
  render(); window.scrollTo(0, 0);
}

function quit() {
  if (!submitted && Object.keys(answers).length && !confirm("Leave this mock? Your progress will be lost.")) return;
  location.href = "hub.html";
}

// utils
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }
function esc2(s) { return esc(s).replace(/\n/g, "<br>"); }
function stripTags(s) { return String(s || "").replace(/<[^>]*>/g, ""); }
window.pick = pick; window.setNumeric = setNumeric; window.toggleFlag = toggleFlag;
window.go = go; window.jump = jump; window.confirmSubmit = confirmSubmit;
window.startReview = startReview; window.quit = quit;
</script>
</body>
