<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeStudy Hub · Instructor Console</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
:root{--navy:#0B1F3A;--navy2:#132840;--navy3:#1A3558;--teal:#0D9488;--teal2:#2DD4BF;--blue:#1D4ED8;--gold:#F59E0B;--rose:#F43F5E;--green:#10B981;--purple:#8B5CF6;--bg:#07131F;--surface:#0F2336;--card:#142B42;--card2:#19324C;--border:#1E3A52;--text:#E2EAF4;--muted:#6B8BAA;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.hidden{display:none!important;}
a{color:inherit;text-decoration:none;}

/* top nav */
.topnav{background:var(--navy);border-bottom:1px solid var(--border);padding:0 22px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--teal),var(--blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.brand-text{font-weight:800;font-size:15px;letter-spacing:1px;color:#fff;text-transform:uppercase;white-space:nowrap;line-height:1.15;}
.brand-sub{font-size:9px;letter-spacing:2px;color:var(--teal2);text-transform:uppercase;white-space:nowrap;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-link{font-size:12px;font-weight:600;color:var(--muted);padding:6px 12px;border-radius:7px;cursor:pointer;}
.nav-link:hover{color:var(--teal2);background:rgba(45,212,191,.08);}
.who{font-size:12px;color:var(--muted);}
.who b{color:#fff;}

/* layout */
.layout{display:flex;min-height:calc(100vh - 56px);}
.sidebar{width:215px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:18px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.side-sec{padding:0 14px;margin-bottom:20px;}
.side-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:0 6px 8px;}
.side-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:2px;}
.side-item:hover{background:rgba(255,255,255,.05);color:var(--text);}
.side-item.active{background:rgba(45,212,191,.12);color:var(--teal2);}
.side-item .ic{font-size:15px;width:18px;text-align:center;}
.side-item .badge{margin-left:auto;background:var(--card2);color:var(--muted);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;}
.side-item.active .badge{background:var(--teal);color:#fff;}

.content{flex:1;padding:26px 28px 70px;max-width:1180px;}
.phead{margin-bottom:22px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.ptitle{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.psub{font-size:13px;color:var(--muted);margin-top:3px;}

/* buttons */
.btn{font:inherit;font-weight:600;font-size:13px;padding:9px 16px;border-radius:9px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text);display:inline-flex;align-items:center;gap:7px;}
.btn:hover{border-color:var(--teal2);color:var(--teal2);}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn.primary:hover{background:#0fb3a3;color:#fff;}
.btn.blue{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn.ghost{background:transparent;}
.btn.sm{padding:6px 11px;font-size:12px;}
.btn.danger:hover{border-color:var(--rose);color:var(--rose);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* cards / grid */
.grid{display:grid;gap:14px;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:18px;}
.card.hov{cursor:pointer;transition:border-color .15s,transform .15s;}
.card.hov:hover{border-color:var(--teal2);transform:translateY(-2px);}
.muted{color:var(--muted);}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--card2);color:var(--muted);}
.pill.teal{background:rgba(45,212,191,.14);color:var(--teal2);}
.pill.blue{background:rgba(29,78,216,.18);color:#7AA2F7;}
.pill.gold{background:rgba(245,158,11,.16);color:#FCD34D;}
.pill.rose{background:rgba(244,63,94,.16);color:#FB7185;}
.pill.green{background:rgba(16,185,129,.16);color:#34D399;}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:13px;margin-bottom:22px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--teal2);}
.stat.b::before{background:var(--blue);}.stat.g::before{background:var(--gold);}.stat.r::before{background:var(--rose);}.stat.gr::before{background:var(--green);}
.stat .v{font-size:27px;font-weight:800;color:#fff;line-height:1;}
.stat .l{font-size:10.5px;font-weight:600;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-top:7px;}

/* table */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--surface);padding:10px 15px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 15px;border-bottom:1px solid rgba(30,58,82,.6);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;flex-shrink:0;}
.scell{display:flex;align-items:center;gap:10px;}
.sname{font-weight:600;color:#fff;}
.semail{font-size:11px;color:var(--muted);}
.bar{height:6px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;min-width:70px;}
.bar>div{height:100%;border-radius:4px;}

/* inputs */
.inp,.sel,.ta{width:100%;font:inherit;font-size:14px;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);outline:none;}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--teal2);}
.ta{resize:vertical;min-height:64px;line-height:1.5;}
.lab{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:block;}
.row{display:flex;gap:12px;}
.row>*{flex:1;}
.field{margin-bottom:15px;}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(3,9,16,.72);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;animation:fade .2s ease;}
.modal.wide{max-width:900px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);border-radius:16px 16px 0 0;z-index:2;}
.modal-head h3{font-size:16px;color:#fff;font-weight:700;}
.x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
.x:hover{color:#fff;}
.modal-body{padding:22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--surface);border-radius:0 0 16px 16px;}

/* builder question card */
.qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.qcard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:10px;}
.qcard-head .n{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--teal2);}
.opt-edit{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.opt-edit .mark{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--surface);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);}
.opt-edit .mark.on{border-color:var(--green);background:var(--green);color:#fff;}
.opt-edit.multi .mark{border-radius:7px;}
.opt-edit input{flex:1;}
.opt-edit .del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;}
.opt-edit .del:hover{color:var(--rose);}

.empty{text-align:center;padding:46px 20px;color:var(--muted);}
.empty .ei{font-size:38px;margin-bottom:10px;opacity:.7;}
.empty .et{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}

.code-box{font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:5px;color:var(--teal2);background:var(--bg);border:1px dashed var(--teal);border-radius:11px;padding:14px 18px;text-align:center;}
.checkrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:9px;margin-bottom:7px;cursor:pointer;background:var(--card);}
.checkrow:hover{border-color:var(--teal2);}
.checkrow.on{border-color:var(--teal);background:rgba(13,148,136,.1);}
.checkrow input{width:17px;height:17px;accent-color:var(--teal);}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-weight:600;font-size:13px;padding:11px 20px;border-radius:10px;z-index:400;box-shadow:0 6px 24px rgba(0,0,0,.4);animation:fade .2s ease;}
.seg{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px;}
.seg button{font:inherit;font-size:12px;font-weight:600;padding:6px 12px;border:none;border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;}
.seg button.on{background:var(--card2);color:#fff;}
.dotg{width:9px;height:9px;border-radius:50%;display:inline-block;}
</style>
</head>
<body>

<div id="boot" style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--muted);gap:12px;">
  <div style="width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--teal2);border-radius:50%;animation:spin .7s linear infinite;"></div> Loading console…
</div>

<div id="app" class="hidden">
  <div class="topnav">
    <div class="brand">
      <div class="brand-icon">🎓</div>
      <div><div class="brand-text">FreeStudy Hub</div><div class="brand-sub">Instructor Console</div></div>
    </div>
    <div class="nav-right">
      <a class="nav-link" href="dashboard.html">📊 Analytics</a>
      <span class="who">Signed in as <b id="whoName">—</b></span>
      <button class="nav-link" onclick="FSHAuth.signOut().then(function(){location.href='index.html';})">Sign out</button>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="side-sec">
        <div class="side-label">Teaching</div>
        <div class="side-item active" data-view="overview" onclick="nav('overview')"><span class="ic">🏠</span> Overview</div>
        <div class="side-item" data-view="mocks" onclick="nav('mocks')"><span class="ic">📝</span> Mocks <span class="badge" id="bMocks">0</span></div>
        <div class="side-item" data-view="assign" onclick="nav('assign')"><span class="ic">📤</span> Assignments <span class="badge" id="bAsg">0</span></div>
      </div>
      <div class="side-sec">
        <div class="side-label">People</div>
        <div class="side-item" data-view="classes" onclick="nav('classes')"><span class="ic">👥</span> Classes <span class="badge" id="bCls">0</span></div>
        <div class="side-item" data-view="followup" onclick="nav('followup')"><span class="ic">🔔</span> Follow-up <span class="badge" id="bFollow">0</span></div>
      </div>
      <div class="side-sec">
        <div class="side-label">Study</div>
        <div class="side-item" data-view="resources" onclick="nav('resources')"><span class="ic">📚</span> Resources <span class="badge" id="bRes">0</span></div>
      </div>
    </aside>

    <main class="content" id="main"></main>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="fsh-auth.js"></script>
<script src="fsh-data.js"></script>
<script>
var ME = null, STATE = { classes:[], mocks:[], assignments:[], resources:[], activeClass:null, view:"overview" };

FSHAuth.gate({ role:"teacher" }).then(async function(ctx){
  ME = ctx;
  document.getElementById("whoName").textContent = (ctx.profile && ctx.profile.name) || ctx.user.email;
  document.getElementById("boot").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  await refreshAll();
  nav("overview");
});

async function refreshAll(){
  STATE.classes = await FSHData.listClasses();
  STATE.mocks = await FSHData.listMocks();
  STATE.assignments = await FSHData.listAssignments();
  STATE.resources = await FSHData.listResources();
  if (!STATE.activeClass && STATE.classes.length) STATE.activeClass = STATE.classes[0]._id;
  document.getElementById("bMocks").textContent = STATE.mocks.length;
  document.getElementById("bAsg").textContent = STATE.assignments.length;
  document.getElementById("bCls").textContent = STATE.classes.length;
  document.getElementById("bRes").textContent = STATE.resources.length;
}

function nav(view){
  STATE.view = view;
  document.querySelectorAll(".side-item").forEach(function(el){ el.classList.toggle("active", el.dataset.view===view); });
  var fn = ({ overview:viewOverview, mocks:viewMocks, assign:viewAssign, classes:viewClasses, resources:viewResources, followup:viewFollowup })[view];
  if (fn) fn();
}

/* ============ helpers ============ */
function el(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function initials(n){ n=(n||"?").trim().split(/\s+/); return ((n[0]||"")[0]||"")+((n[1]||"")[0]||""); }
function avColor(s){ var h=0; s=s||""; for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h); var c=["#0D9488","#1D4ED8","#8B5CF6","#F59E0B","#F43F5E","#10B981","#06B6D4"]; return c[Math.abs(h)%c.length]; }
function fmtDate(t){ if(!t)return "—"; var d=new Date(t); return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function toast(msg){ var t=document.createElement("div"); t.className="toast"; t.textContent=msg; el("toastRoot").appendChild(t); setTimeout(function(){t.remove();},2400); }
function scoreCol(p){ return p>=70?"var(--green)":p>=50?"var(--teal2)":p>=40?"var(--gold)":"var(--rose)"; }
function closeModal(){ el("modalRoot").innerHTML=""; }
function activeClassObj(){ return STATE.classes.find(function(c){return c._id===STATE.activeClass;})||null; }
function typeName(t){ return ({mc:"Multiple choice",multi:"Multiple answer",numeric:"Numeric entry",short:"Short answer",qc:"Quantitative comparison"})[t]||t; }

function classPicker(){
  if (!STATE.classes.length) return "";
  return '<div class="seg" style="margin-bottom:16px;">'+STATE.classes.map(function(c){
    return '<button class="'+(c._id===STATE.activeClass?"on":"")+'" onclick="setClass(\''+c._id+'\')">'+esc(c.name)+'</button>';
  }).join("")+'</div>';
}
function setClass(id){ STATE.activeClass=id; nav(STATE.view); }
window.setClass=setClass;

/* ============ data aggregation ============ */
async function loadClassData(classId){
  // roster + each student's results + engagement
  var roster = classId ? await FSHData.classRoster(classId) : [];
  var eng = await FSHData.allEngagement();
  var students = [];
  for (var i=0;i<roster.length;i++){
    var r = roster[i];
    var results = await FSHData.resultsForStudent(r.email);
    var scores = results.map(function(x){return x.score;});
    var avg = scores.length ? Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length) : null;
    var best = scores.length ? Math.max.apply(null,scores) : null;
    var latest = results.length ? results[0].score : null;
    var trend = "flat";
    if (results.length>=2){ var ch=results[0].score - results[results.length-1].score; trend = ch>4?"up":ch<-4?"down":"flat"; }
    students.push({ name:r.name, email:r.email, emailKey:r.emailKey, results:results, count:results.length,
      avg:avg, best:best, latest:latest, trend:trend, engagement:eng[r.emailKey]||{} });
  }
  return { roster:roster, students:students, eng:eng };
}

/* ============ OVERVIEW ============ */
async function viewOverview(){
  var m = el("main");
  m.innerHTML = '<div class="phead"><div><div class="ptitle">Overview</div><div class="psub">Your classroom at a glance</div></div>'+
    '<div style="display:flex;gap:10px;"><button class="btn" onclick="openMockEditor()">＋ New mock</button><button class="btn primary" onclick="openAssign()">📤 Assign a mock</button></div></div>'+
    '<div id="ovStats" class="stats"></div>'+
    '<div class="grid" style="grid-template-columns:1.4fr 1fr;gap:16px;align-items:start;">'+
      '<div><div class="phead" style="margin-bottom:12px;"><div class="ptitle" style="font-size:15px;">Needs follow-up</div></div><div id="ovFollow"></div></div>'+
      '<div><div class="phead" style="margin-bottom:12px;"><div class="ptitle" style="font-size:15px;">Recent assignments</div></div><div id="ovAsg"></div></div>'+
    '</div>';

  var data = await loadClassData(STATE.activeClass);
  var students = data.students;
  var totalStudents = students.length;
  var avgAll = students.filter(function(s){return s.avg!=null;});
  var classAvg = avgAll.length ? Math.round(avgAll.reduce(function(a,b){return a+b.avg;},0)/avgAll.length) : 0;
  var atRisk = students.filter(function(s){return s.avg!=null && s.avg<40;}).length;
  var inactive = students.filter(function(s){ return Object.keys(s.engagement).length===0 && s.count===0; }).length;

  el("ovStats").innerHTML =
    statCard("",totalStudents,"Students","") +
    statCard("gr",classAvg+"%","Class average","") +
    statCard("b",STATE.mocks.length,"Mocks built","") +
    statCard("g",STATE.assignments.length,"Assignments sent","") +
    statCard("r",atRisk,"At risk (<40%)","");

  // follow-up preview
  var flagged = computeFollowup(students,data.eng);
  el("ovFollow").innerHTML = flagged.length ? '<div class="tbl-wrap"><table><tbody>'+flagged.slice(0,6).map(function(f){
    return '<tr><td><div class="scell"><div class="avatar" style="background:'+avColor(f.email)+'">'+esc(initials(f.name))+'</div><div><div class="sname">'+esc(f.name)+'</div><div class="semail">'+f.reason+'</div></div></div></td>'+
      '<td style="text-align:right;"><button class="btn sm" onclick="openStudent(\''+f.emailKey+'\')">View</button></td></tr>';
  }).join("")+'</tbody></table></div>' : emptyBox("✅","Everyone's on track","No students need follow-up right now.");

  el("ovAsg").innerHTML = STATE.assignments.length ? STATE.assignments.slice(0,5).map(function(a){
    return '<div class="card" style="padding:13px 15px;margin-bottom:10px;"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px;"><div><div style="font-weight:600;color:#fff;font-size:13px;">'+esc(a.mockTitle||"Mock")+'</div><div class="muted" style="font-size:11px;">'+(a.target&&a.target.type==="students"?"Specific students":"Whole class")+' · '+fmtDate(a.createdAt)+'</div></div><span class="pill teal">'+(a.target&&a.target.type==="students"?Object.keys(a.target.emailKeys||{}).length+" sent":"Class")+'</span></div></div>';
  }).join("") : emptyBox("📤","No assignments yet","Build a mock, then assign it to your class.");
}
function statCard(cls,v,l){ return '<div class="stat '+cls+'"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>'; }
function emptyBox(i,t,s){ return '<div class="card"><div class="empty"><div class="ei">'+i+'</div><div class="et">'+t+'</div><div class="muted" style="font-size:12.5px;">'+s+'</div></div></div>'; }

/* ============ MOCKS LIST ============ */
function viewMocks(){
  var m = el("main");
  m.innerHTML = '<div class="phead"><div><div class="ptitle">Mocks</div><div class="psub">Author timed practice tests, then assign them.</div></div>'+
    '<button class="btn primary" onclick="openMockEditor()">＋ New mock</button></div>'+
    (STATE.mocks.length ? '<div class="cards" id="mockCards"></div>' : emptyBox("📝","No mocks yet","Create your first mock — add questions, set a timer, and send it to your class."));
  if (!STATE.mocks.length) return;
  el("mockCards").innerHTML = STATE.mocks.map(function(mk){
    var secColor = mk.section==="verbal"?"blue":mk.section==="data"?"gold":"teal";
    return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;">'+
      '<div style="font-weight:700;color:#fff;font-size:15px;line-height:1.3;">'+esc(mk.title)+'</div>'+

function parseImport(text){
  var t = String(text||"").trim();
  if(t.charAt(0)==="[" || t.charAt(0)==="{"){
    try{
      var arr = JSON.parse(t); if(!Array.isArray(arr)) arr=[arr];
      return { questions: arr.map(normalizeImportedQ), errors:[] };
    }catch(e){ return { questions:[], errors:["JSON error: "+e.message] }; }
  }
  return parseBank(text);
}
function normalizeImportedQ(o){
  var t=o.type||"mc", map={A:0,B:1,C:2,D:3};
  var q={ type:t, stem:o.stem||"", passage:o.passage||"", explanation:o.explanation||"", tags:o.tags||[] };
  if(t==="qc"){ q.quantA=o.quantA||""; q.quantB=o.quantB||""; q.answer=typeof o.answer==="number"?o.answer:(map[String(o.answer).toUpperCase()]||0); }
  else if(t==="numeric"||t==="short"){ q.answer=o.answer!=null?String(o.answer):""; }
  else { q.options=o.options||[]; if(t==="multi"){ var aa=Array.isArray(o.answer)?o.answer:[]; q.answer=aa.map(function(v){ return typeof v==="number"?v:map[String(v).toUpperCase()]; }).filter(function(n){return n!=null;}); } else { q.answer = typeof o.answer==="number"?o.answer:(map[String(o.answer).toUpperCase()]||0); } }
  return q;
}
function parseBank(text){
  var blocks = String(text||"").replace(/\r/g,"").split(/\n\s*\n/);
  var out=[], errs=[];
  blocks.forEach(function(block, bi){
    var lines = block.split("\n").map(function(s){return s.trim();}).filter(Boolean);
    if(!lines.length) return;
    var first = lines[0];
    var isQC = /^qc\s*[:.\)]/i.test(first);
    var stem = first.replace(/^(qc|q)\s*[:.\)]\s*/i,"").replace(/^\d+\s*[\.\)]\s*/,"");
    var q = { type:isQC?"qc":"mc", stem:stem, tags:[], explanation:"", passage:"" };
    var options=[], correct=[], quantA="", quantB="", qcAns=null, numAns=null;
    for(var i=1;i<lines.length;i++){
      var ln=lines[i];
      var mOpt = ln.match(/^(\*?)\s*\(?([A-Za-z])\)?\s*[\)\.]\s*(.+)$/);
      if(/^tags?\s*:/i.test(ln)){ q.tags = ln.replace(/^tags?\s*:/i,"").split(",").map(function(s){return s.trim();}).filter(Boolean); }
      else if(/^(explanation|explain)\s*:/i.test(ln)){ q.explanation = ln.replace(/^(explanation|explain)\s*:/i,"").trim(); }
      else if(/^passage\s*:/i.test(ln)){ q.passage = ln.replace(/^passage\s*:/i,"").trim(); }
      else if(/^quantity\s*a\s*:/i.test(ln)){ quantA = ln.replace(/^quantity\s*a\s*:/i,"").trim(); }
      else if(/^quantity\s*b\s*:/i.test(ln)){ quantB = ln.replace(/^quantity\s*b\s*:/i,"").trim(); }
      else if(/^answer\s*:/i.test(ln)){
        var av = ln.replace(/^answer\s*:/i,"").trim();
        if(isQC){ qcAns=av; }
        else if(/^[A-Za-z](\s*,\s*[A-Za-z])*$/.test(av)){ av.split(",").forEach(function(L){ correct.push(L.trim().toUpperCase()); }); }
        else { numAns=av; }
      }
      else if(mOpt && !isQC){ if(mOpt[1]==="*") correct.push(mOpt[2].toUpperCase()); options.push(mOpt[3].trim()); }
      else { q.stem += " " + ln; }
    }
    if(isQC){
      q.type="qc"; q.quantA=quantA; q.quantB=quantB;
      var map={A:0,B:1,C:2,D:3}; q.answer = map[(qcAns||"D").toUpperCase()]!=null ? map[(qcAns||"D").toUpperCase()] : 3;
      if(!quantA||!quantB) errs.push("Q"+(bi+1)+": quant comparison missing Quantity A or B.");
    } else if(options.length===0){
      var isNum = numAns!=null && /^-?\d+(\.\d+)?$/.test(String(numAns).replace(/[, ]/g,""));
      q.type = isNum ? "numeric" : "short";
      q.answer = numAns!=null?numAns:"";
      if(numAns==null) errs.push("Q"+(bi+1)+": no options and no Answer line.");
    } else {
      var idxs = correct.map(function(L){ return L.charCodeAt(0)-65; }).filter(function(n,i,a){ return n>=0 && n<options.length && a.indexOf(n)===i; });
      if(!idxs.length){ errs.push("Q"+(bi+1)+": no correct option marked (use * or Answer:)."); idxs=[0]; }
      q.options = options;
      if(idxs.length>1){ q.type="multi"; q.answer=idxs; } else { q.type="mc"; q.answer=idxs[0]; }
    }
    out.push(q);
  });
  return { questions:out, errors:errs };
}
function openImport(){
  var ov=document.createElement("div"); ov.className="overlay"; ov.id="importOverlay"; ov.style.zIndex="300";
  ov.onclick=function(e){ if(e.target===ov) closeImport(); };

/* ============ FOLLOW-UP ============ */
function computeFollowup(students, eng){
  var out=[];
  students.forEach(function(s){
    var reasons=[];
    if (s.count===0) reasons.push("Hasn't taken any mock");
    else if (s.avg!=null && s.avg<40) reasons.push("Avg "+s.avg+"% — at risk");
    else if (s.trend==="down") reasons.push("Scores declining");
    var openedCount = Object.keys(s.engagement||{}).length;
    if (STATE.resources.length>=2 && openedCount===0) reasons.push("Ignoring shared resources");
    if (reasons.length) out.push({ name:s.name, email:s.email, emailKey:s.emailKey, reason:reasons.join(" · "),
      severity:(s.count===0||(s.avg!=null&&s.avg<40))?2:1 });
  });
  return out.sort(function(a,b){return b.severity-a.severity;});
}
async function viewFollowup(){
  var m = el("main");
  m.innerHTML = '<div class="phead"><div><div class="ptitle">Follow-up</div><div class="psub">Students slipping on scores or ignoring study resources — reach out before it compounds.</div></div></div>'+
    (STATE.classes.length?classPicker():"")+'<div id="fuBody"></div>';
  if (!STATE.classes.length){ el("fuBody").innerHTML=emptyBox("👥","No classes yet","Create a class to start tracking commitment."); return; }
  var data = await loadClassData(STATE.activeClass);
  var flagged = computeFollowup(data.students, data.eng);
  el("bFollow").textContent = flagged.length;
  if (!flagged.length){ el("fuBody").innerHTML = emptyBox("✅","All clear","Every student is engaging and on track. Nice work."); return; }
  el("fuBody").innerHTML = '<div class="tbl-wrap"><table><thead><tr><th>Student</th><th>Why flagged</th><th>Avg</th><th>Resources</th><th></th></tr></thead><tbody>'+
    flagged.map(function(f){
      var s = data.students.find(function(x){return x.emailKey===f.emailKey;});
      var opened = Object.keys(s.engagement||{}).length;
      return '<tr><td><div class="scell"><div class="avatar" style="background:'+avColor(f.email)+'">'+esc(initials(f.name))+'</div><div><div class="sname">'+esc(f.name)+'</div><div class="semail">'+esc(f.email)+'</div></div></div></td>'+
        '<td><span class="pill '+(f.severity===2?"rose":"gold")+'">'+esc(f.reason)+'</span></td>'+
        '<td>'+(s.avg!=null?'<span style="font-family:var(--mono);color:'+scoreCol(s.avg)+'">'+s.avg+'%</span>':'<span class="muted">No data</span>')+'</td>'+
        '<td><span class="muted" style="font-family:var(--mono);">'+opened+'/'+STATE.resources.length+'</span></td>'+
        '<td style="text-align:right;white-space:nowrap;"><a class="btn sm" href="mailto:'+esc(f.email)+'?subject=FreeStudy%20Hub%20check-in">✉ Email</a> <button class="btn sm" onclick="openStudent(\''+f.emailKey+'\')">View</button></td></tr>';
    }).join("")+'</tbody></table></div>';
}

/* ============ STUDENT DRAWER ============ */
async function openStudent(ek){
  var roster=[]; for(var i=0;i<STATE.classes.length;i++){ roster=roster.concat(await FSHData.classRoster(STATE.classes[i]._id)); }
  var r = roster.find(function(x){return x.emailKey===ek;});
  if(!r){toast("Student not found");return;}
  var results = await FSHData.resultsForStudent(r.email);
  var eng = await FSHData.engagementFor(r.email);
  var scores = results.map(function(x){return x.score;});
  var avg = scores.length?Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length):null;
  var best = scores.length?Math.max.apply(null,scores):null;
  // tag mastery aggregate
  var tags={}; results.forEach(function(res){ if(res.tagResults) Object.entries(res.tagResults).forEach(function(t){ if(!tags[t[0]])tags[t[0]]={correct:0,total:0}; tags[t[0]].correct+=t[1].correct; tags[t[0]].total+=t[1].total; }); });
  el("modalRoot").innerHTML =
  '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-head"><h3>'+esc(r.name)+'</h3><button class="x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
      '<div class="muted" style="font-size:12.5px;margin-top:-8px;margin-bottom:14px;">'+esc(r.email)+'</div>'+
      '<div class="stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px;">'+
        '<div class="stat"><div class="v">'+results.length+'</div><div class="l">Mocks taken</div></div>'+
        '<div class="stat gr"><div class="v">'+(avg!=null?avg+"%":"—")+'</div><div class="l">Average</div></div>'+
        '<div class="stat b"><div class="v">'+(best!=null?best+"%":"—")+'</div><div class="l">Best</div></div></div>'+
      '<div class="lab">Recent mocks</div>'+
      (results.length?('<div class="tbl-wrap" style="margin-bottom:16px;"><table><tbody>'+results.slice(0,6).map(function(res){
        var mk = STATE.mocks.find(function(m){return m._id===res.testId;});
        return '<tr><td><div style="font-weight:600;color:#fff;">'+esc(mk?mk.title:res.testId)+'</div><div class="semail">'+fmtDate(res.timestamp)+'</div></td><td style="text-align:right;"><span style="font-family:var(--mono);font-weight:700;color:'+scoreCol(res.score)+'">'+res.score+'%</span></td></tr>';
      }).join("")+'</tbody></table></div>'):'<div class="muted" style="font-size:13px;margin-bottom:16px;">No mocks completed yet.</div>')+
      (Object.keys(tags).length?('<div class="lab">Topic mastery</div><div style="margin-bottom:16px;">'+Object.entries(tags).map(function(t){ var p=Math.round(t[1].correct/t[1].total*100); return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><div style="font-size:12.5px;width:110px;">'+esc(t[0])+'</div><div class="bar" style="flex:1;"><div style="width:'+p+'%;background:'+scoreCol(p)+'"></div></div><div style="font-family:var(--mono);font-size:12px;width:42px;text-align:right;color:'+scoreCol(p)+'">'+p+'%</div></div>'; }).join("")+'</div>'):'')+
      '<div class="lab">Resource engagement</div>'+
      (STATE.resources.length?('<div>'+STATE.resources.map(function(res){ var e=eng[res._id]; return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);"><span class="dotg" style="background:'+(e?(e.completed?"var(--green)":"var(--gold)"):"var(--rose)")+'"></span><div style="flex:1;font-size:13px;">'+esc(res.title)+'</div><span class="muted" style="font-size:11.5px;font-family:var(--mono);">'+(e?(e.completed?"completed":"opened "+e.opens+"×"):"not opened")+'</span></div>'; }).join("")+'</div>'):'<div class="muted" style="font-size:13px;">No resources shared yet.</div>')+
    '</div>'+
    '<div class="modal-foot"><a class="btn" href="mailto:'+esc(r.email)+'">✉ Email student</a><button class="btn primary" onclick="closeModal()">Close</button></div>'+
  '</div></div>';
}
